<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | The Roastery</title>
    
</head>
<body>

    <div class="contact-wrapper">
        <section class="contact-info">
            <h2>Visit the Brew Bar</h2>
            <div class="info-item">
                <h3>Our Location</h3>
                <p>123 Espresso Blvd, Arabica District<br>Roast City, RC 54321</p>
            </div>
            <div class="info-item">
                <h3>Hours</h3>
                <p>Mon - Fri: 7am - 6pm<br>Sat - Sun: 8am - 8pm</p>
            </div>
            <div class="info-item">
                <h3>Direct Line</h3>
                <p>+1 (555) 000-BEANS</p>
            </div>
        </section>

        <section class="contact-form-container">
            <h2>Drop us a line</h2>
            <form action="#">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="subject">Inquiry Type</label>
                    <input type="text" id="subject" placeholder="Catering, Feedback, etc.">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Tell us how we can help..."></textarea>
                </div>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </div>

</body>
</html>
